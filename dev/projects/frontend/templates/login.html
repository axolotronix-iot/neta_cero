{% extends "base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">

    <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
        Neta Cero Login
    </h2>

    <form action="/login" method="post" class="space-y-5">

        <div>
            <label for="username" class="block text-sm font-medium mb-1">
                Usuario
            </label>
            <input 
                type="text" 
                id="username" 
                name="username" 
                required
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-violet-500 focus:outline-none"
            >
        </div>
        
        <div>
            <label for="password" class="block text-sm font-medium mb-1">
                Contraseña
            </label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                required
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-violet-500 focus:outline-none"
            >
        </div>

        <button 
            type="submit"
            class="w-full bg-violet-600 text-white py-2 rounded-lg hover:bg-violet-700 transition"
        >
            Entrar
        </button>
    </form>
    
    {% if error %}
        <p class="mt-4 text-sm text-red-600 text-center">
            {{ error }}
        </p>
    {% endif %}

</div>
{% endblock %}
